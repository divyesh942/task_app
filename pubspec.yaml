name: todo_design
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_svg: ^2.1.0
  uuid: ^4.5.3
  get: ^4.7.3
  loading_animation_widget: ^1.3.0
  cupertino_icons: ^1.0.6
  shared_preferences: ^2.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^4.0.0

flutter:

  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    
  fonts:
    - family: SourceSans
      fonts:
        - asset: assets/fonts/source-sans-pro/SourceSansPro-Regular.otf
        - asset: assets/fonts/source-sans-pro/SourceSansPro-Bold.otf
        - asset: assets/fonts/source-sans-pro/SourceSansPro-Semibold.otf
